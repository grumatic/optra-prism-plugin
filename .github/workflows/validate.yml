name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Validate plugin.json
        run: |
          node -e "
            const p = JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json', 'utf8'));
            const pkg = JSON.parse(require('fs').readFileSync('package.json', 'utf8'));
            const m = JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json', 'utf8'));
            if (!p.version) throw new Error('Missing version in plugin.json');
            if (!p.name) throw new Error('Missing name in plugin.json');
            if (p.version !== pkg.version) throw new Error('Version mismatch: plugin.json=' + p.version + ' package.json=' + pkg.version);
            const mp = m.plugins.find(x => x.name === p.name);
            if (mp && mp.version !== p.version) throw new Error('Version mismatch: marketplace.json=' + mp.version);
            console.log('OK: ' + p.name + '@' + p.version);
          "

      - name: Syntax check JS
        run: |
          for f in lib/*.js hooks/scripts/*.js; do
            node --check "$f"
          done

      - name: Validate hooks.json
        run: node -e "JSON.parse(require('fs').readFileSync('hooks/hooks.json', 'utf8'))"

      - name: Validate command frontmatter
        run: |
          for f in commands/*.md; do
            head -1 "$f" | grep -q '^---$' || (echo "Missing frontmatter in $f" && exit 1)
          done
